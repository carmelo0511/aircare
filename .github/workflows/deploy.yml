# CI/CD workflow: Build and deploy AirCare frontend to S3 & CloudFront
# This workflow runs on every push to the `main` branch
name: Deploy Frontend to S3 & CloudFront

on:
  push:
    branches:
      - main  # Trigger when code is pushed to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Sync to S3
        run: aws s3 sync dist/ s3://aircare-frontend-304783065136 --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EYUPG0T86C3V0 \
            --paths '/*'
